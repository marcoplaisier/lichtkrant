<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Lichtkrant{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff8855;
            margin-bottom: 10px;
        }
        h2 {
            color: #00ff88;
            font-size: 1.3em;
            margin-top: 30px;
        }
        nav {
            display: flex;
            gap: 0;
            margin-bottom: 25px;
            border-radius: 8px;
            overflow: hidden;
        }
        nav a {
            flex: 1;
            padding: 12px;
            background: #16213e;
            color: #aaa;
            text-decoration: none;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s;
        }
        nav a:hover { background: #1a2a4e; color: #ccc; }
        nav a.active {
            background: #00ff88;
            color: #1a1a2e;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #aaa;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 16px;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #00ff88;
        }
        input[type="range"] { width: 100%; }
        input[type="number"] {
            padding: 8px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 14px;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #00ff88;
        }
        button, .btn {
            padding: 15px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover, .btn:hover { transform: scale(1.02); }
        button:active, .btn:active { transform: scale(0.98); }
        .btn-full { width: 100%; }
        .btn-small { padding: 8px 12px; font-size: 12px; }
        .btn-danger { background: linear-gradient(135deg, #ff6666, #cc4444); }
        .btn-secondary { background: linear-gradient(135deg, #666, #444); color: #fff; }
        .btn-info { background: linear-gradient(135deg, #4488ff, #3366cc); color: #fff; }
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        .status.success { background: #00ff8833; color: #00ff88; }
        .status.error { background: #ff006633; color: #ff6666; }
        .speed-value {
            text-align: center;
            color: #00ff88;
            font-family: monospace;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
        }
        .badge-color { background: #333; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input[type="checkbox"] { width: 20px; height: 20px; }
        .segment-color-indicator {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 2px;
        }
        .badge-control {
            background: #2a1a4e;
            border: 1px solid #8855cc44;
            color: #cc88ff;
        }
        .card {
            background: #16213e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <h1>Lichtkrant</h1>
    <nav>
        <a href="/" {% if active_page == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
        <a href="/texts/" {% if active_page == 'texts' %}class="active"{% endif %}>Texts</a>
        <a href="/queue/" {% if active_page == 'queue' %}class="active"{% endif %}>Queue</a>
    </nav>
    {% block content %}{% endblock %}
    <script>
        const COLOR_CSS = {
            NONE: '#000', GREEN: '#0f0', RED: '#f44', BLUE: '#48f',
            YELLOW: '#ff0', CYAN: '#0ff', MAGENTA: '#f0f', WHITE: '#fff'
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function showStatus(el, success, message) {
            el.style.display = 'block';
            el.className = 'status ' + (success ? 'success' : 'error');
            el.textContent = message;
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function renderSegmentBadges(segments) {
            if (!segments || segments.length === 0) return '';
            return segments.map(s => {
                const type = s.type || 'text';
                if (type === 'pause')
                    return `<span class="segment-color-indicator badge-control">[Pause ${s.duration}s]</span>`;
                if (type === 'fast_blink')
                    return `<span class="segment-color-indicator badge-control">[Fast Blink x${s.times}]</span>`;
                if (type === 'slow_blink')
                    return `<span class="segment-color-indicator badge-control">[Slow Blink x${s.times}]</span>`;
                if (type === 'flash')
                    return `<span class="segment-color-indicator badge-control">[Flash "${escapeHtml(s.text)}" ${s.duration}s${s.scroll_off ? ' scroll' : ''}]</span>`;
                return `<span class="segment-color-indicator" style="color: ${COLOR_CSS[s.color] || '#fff'}; border: 1px solid ${COLOR_CSS[s.color] || '#fff'}44">${escapeHtml(s.text)} <small>(${s.color})</small></span>`;
            }).join('');
        }
        {% block extra_script %}{% endblock %}
    </script>
</body>
</html>
