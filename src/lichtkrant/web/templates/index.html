<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichtkrant</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        h1, h2 {
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff8855;
        }
        h2 {
            font-size: 1.3em;
            margin-top: 40px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
        }
        .tab {
            flex: 1;
            padding: 12px;
            background: #16213e;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab.active {
            background: #00ff88;
            color: #1a1a2e;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #aaa;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 16px;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #00ff88;
        }
        input[type="range"] {
            width: 100%;
        }
        button, .btn {
            padding: 15px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover, .btn:hover {
            transform: scale(1.02);
        }
        button:active, .btn:active {
            transform: scale(0.98);
        }
        .btn-full {
            width: 100%;
        }
        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff6666, #cc4444);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #666, #444);
            color: #fff;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        .status.success {
            background: #00ff8833;
            color: #00ff88;
        }
        .status.error {
            background: #ff006633;
            color: #ff6666;
        }
        .speed-value {
            text-align: center;
            color: #00ff88;
            font-family: monospace;
        }
        .text-list {
            margin-top: 20px;
        }
        .text-item {
            background: #16213e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #333;
        }
        .text-item.active {
            border-left-color: #00ff88;
        }
        .text-item.inactive {
            opacity: 0.6;
        }
        .text-content {
            font-size: 16px;
            margin-bottom: 10px;
            word-break: break-word;
        }
        .text-meta {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
        }
        .text-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
        }
        .badge-color {
            background: #333;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
        }
        .segment-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .segment-row .segment-main {
            display: flex;
            gap: 8px;
            width: 100%;
            align-items: center;
        }
        .segment-row .segment-main select.seg-type {
            width: 120px;
            flex-shrink: 0;
        }
        .segment-row .segment-main input[type="text"] {
            flex: 1;
        }
        .segment-row .segment-main select.seg-color {
            width: 130px;
            flex-shrink: 0;
        }
        .segment-row .segment-main .btn-remove {
            padding: 10px 12px;
            font-size: 14px;
            flex-shrink: 0;
        }
        .segment-row .segment-extra {
            display: flex;
            gap: 8px;
            width: 100%;
            padding-left: 128px;
            align-items: center;
        }
        .segment-row .segment-extra label {
            margin: 0;
            font-size: 12px;
            white-space: nowrap;
        }
        .segment-row .segment-extra input[type="number"] {
            width: 80px;
            padding: 8px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 14px;
        }
        .segment-row .segment-extra input[type="number"]:focus {
            outline: none;
            border-color: #00ff88;
        }
        .segment-row .segment-extra .checkbox-group {
            gap: 6px;
        }
        .segment-row .segment-extra .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .btn-add-segment {
            padding: 10px;
            font-size: 13px;
            width: 100%;
            margin-bottom: 20px;
        }
        .segment-color-indicator {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin-right: 2px;
        }
        .badge-control {
            background: #2a1a4e;
            border: 1px solid #8855cc44;
            color: #cc88ff;
        }
    </style>
</head>
<body>
    <h1>Lichtkrant</h1>

    <div class="tabs">
        <button class="tab active" data-tab="texts">Stored Texts</button>
        <button class="tab" data-tab="direct">Direct Send</button>
    </div>

    <div id="texts-tab" class="tab-content active">
        <form id="textForm">
            <input type="hidden" id="editId" value="">

            <div class="form-group">
                <label>Text Segments</label>
                <div id="segmentsContainer"></div>
                <button type="button" class="btn-add-segment btn-secondary" id="addSegmentBtn">+ Add Segment</button>
            </div>

            <div class="form-group">
                <label for="textBackground">Background</label>
                <select id="textBackground" name="background">
                    <option value="NONE">None (Black)</option>
                    <option value="GREEN">Green</option>
                    <option value="RED">Red</option>
                    <option value="BLUE">Blue</option>
                    <option value="YELLOW">Yellow</option>
                    <option value="CYAN">Cyan</option>
                    <option value="MAGENTA">Magenta</option>
                    <option value="WHITE">White</option>
                </select>
            </div>

            <div class="form-group">
                <label for="textFont">Font</label>
                <select id="textFont" name="font">
                    <option value="KONGTEXT">Kongtext</option>
                    <option value="CUSTOM">Custom</option>
                    <option value="MUNRO_SMALL">Munro Small</option>
                </select>
            </div>

            <div class="form-group">
                <label for="textSpeed">Scroll Speed</label>
                <input type="range" id="textSpeed" name="speed" min="1" max="255" value="32">
                <div class="speed-value" id="textSpeedValue">32</div>
            </div>

            <div class="form-group checkbox-group">
                <input type="checkbox" id="textActive" name="active" checked>
                <label for="textActive" style="margin-bottom: 0;">Active (include in rotation)</label>
            </div>

            <button type="submit" class="btn-full" id="submitBtn">Add Text</button>
            <button type="button" class="btn-full btn-secondary" id="cancelEdit" style="display: none; margin-top: 10px;">Cancel Edit</button>
        </form>

        <div id="textStatus" class="status" style="display: none;"></div>

        <h2>Stored Texts</h2>
        <div id="textList" class="text-list">
            <div class="empty-state">Loading...</div>
        </div>
    </div>

    <div id="direct-tab" class="tab-content">
        <form id="messageForm">
            <div class="form-group">
                <label for="text">Message</label>
                <input type="text" id="text" name="text" placeholder="Enter your message..." maxlength="200" required>
            </div>

            <div class="form-group">
                <label for="color">Text Color</label>
                <select id="color" name="color">
                    <option value="NONE">None (Black)</option>
                    <option value="WHITE" selected>White</option>
                    <option value="GREEN">Green</option>
                    <option value="RED">Red</option>
                    <option value="BLUE">Blue</option>
                    <option value="YELLOW">Yellow</option>
                    <option value="CYAN">Cyan</option>
                    <option value="MAGENTA">Magenta</option>
                </select>
            </div>

            <div class="form-group">
                <label for="background">Background</label>
                <select id="background" name="background">
                    <option value="NONE">None (Black)</option>
                    <option value="GREEN">Green</option>
                    <option value="RED">Red</option>
                    <option value="BLUE">Blue</option>
                    <option value="YELLOW">Yellow</option>
                    <option value="CYAN">Cyan</option>
                    <option value="MAGENTA">Magenta</option>
                    <option value="WHITE">White</option>
                </select>
            </div>

            <div class="form-group">
                <label for="font">Font</label>
                <select id="font" name="font">
                    <option value="KONGTEXT">Kongtext</option>
                    <option value="CUSTOM">Custom</option>
                    <option value="MUNRO_SMALL">Munro Small</option>
                </select>
            </div>

            <div class="form-group">
                <label for="speed">Scroll Speed</label>
                <input type="range" id="speed" name="speed" min="1" max="255" value="32">
                <div class="speed-value" id="speedValue">32</div>
            </div>

            <button type="submit" class="btn-full">Send to Display</button>
        </form>

        <div id="status" class="status" style="display: none;"></div>
    </div>

    <script>
        const COLOR_OPTIONS = `
            <option value="NONE">None (Black)</option>
            <option value="WHITE" selected>White</option>
            <option value="GREEN">Green</option>
            <option value="RED">Red</option>
            <option value="BLUE">Blue</option>
            <option value="YELLOW">Yellow</option>
            <option value="CYAN">Cyan</option>
            <option value="MAGENTA">Magenta</option>
        `;

        const TYPE_OPTIONS = `
            <option value="text">Text</option>
            <option value="pause">Pause</option>
            <option value="fast_blink">Fast Blink</option>
            <option value="slow_blink">Slow Blink</option>
            <option value="flash">Flash</option>
        `;

        const COLOR_CSS = {
            NONE: '#000', GREEN: '#0f0', RED: '#f44', BLUE: '#48f',
            YELLOW: '#ff0', CYAN: '#0ff', MAGENTA: '#f0f', WHITE: '#fff'
        };

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
            });
        });

        // Speed sliders
        document.getElementById('speed').addEventListener('input', (e) => {
            document.getElementById('speedValue').textContent = e.target.value;
        });
        document.getElementById('textSpeed').addEventListener('input', (e) => {
            document.getElementById('textSpeedValue').textContent = e.target.value;
        });

        // Segment management
        const segmentsContainer = document.getElementById('segmentsContainer');

        function updateSegmentFields(row) {
            const type = row.querySelector('.seg-type').value;
            const textInput = row.querySelector('.seg-text');
            const colorSelect = row.querySelector('.seg-color');
            const extraDiv = row.querySelector('.segment-extra');

            // Show/hide main fields
            textInput.style.display = (type === 'text' || type === 'flash') ? '' : 'none';
            colorSelect.style.display = (type === 'text' || type === 'flash') ? '' : 'none';
            textInput.placeholder = type === 'flash' ? 'Flash text...' : 'Enter text...';

            // Build extra fields
            let extraHtml = '';
            if (type === 'pause') {
                const dur = extraDiv.dataset.duration || '2';
                extraHtml = `<label>Duration (s):</label><input type="number" class="seg-duration" min="1" max="255" value="${dur}">`;
            } else if (type === 'fast_blink' || type === 'slow_blink') {
                const times = extraDiv.dataset.times || '3';
                extraHtml = `<label>Times:</label><input type="number" class="seg-times" min="1" max="255" value="${times}">`;
            } else if (type === 'flash') {
                const dur = extraDiv.dataset.duration || '2';
                const scrollOff = extraDiv.dataset.scrollOff === 'true';
                extraHtml = `<label>Hold (s):</label><input type="number" class="seg-duration" min="1" max="255" value="${dur}">
                    <div class="checkbox-group"><input type="checkbox" class="seg-scroll-off" ${scrollOff ? 'checked' : ''}><label>Scroll off</label></div>`;
            }
            extraDiv.innerHTML = extraHtml;
            extraDiv.style.display = extraHtml ? '' : 'none';
        }

        function addSegmentRow(opts = {}) {
            const { text = '', color = 'WHITE', type = 'text', duration = 2, times = 3, scroll_off = false } = opts;
            const row = document.createElement('div');
            row.className = 'segment-row';
            row.innerHTML = `
                <div class="segment-main">
                    <select class="seg-type">${TYPE_OPTIONS}</select>
                    <input type="text" class="seg-text" placeholder="Enter text..." maxlength="200" value="${escapeAttr(text)}">
                    <select class="seg-color">${COLOR_OPTIONS}</select>
                    <button type="button" class="btn btn-small btn-danger btn-remove">X</button>
                </div>
                <div class="segment-extra" data-duration="${duration}" data-times="${times}" data-scroll-off="${scroll_off}"></div>
            `;
            row.querySelector('.seg-type').value = type;
            row.querySelector('.seg-color').value = color;
            row.querySelector('.btn-remove').addEventListener('click', () => {
                row.remove();
                if (segmentsContainer.children.length === 0) {
                    addSegmentRow();
                }
            });
            row.querySelector('.seg-type').addEventListener('change', () => updateSegmentFields(row));
            segmentsContainer.appendChild(row);
            updateSegmentFields(row);
        }

        document.getElementById('addSegmentBtn').addEventListener('click', () => {
            addSegmentRow();
        });

        function getSegments() {
            const rows = segmentsContainer.querySelectorAll('.segment-row');
            const segments = [];
            rows.forEach(row => {
                const type = row.querySelector('.seg-type').value;
                if (type === 'text') {
                    const text = row.querySelector('.seg-text').value;
                    const color = row.querySelector('.seg-color').value;
                    if (text) segments.push({ type, text, color });
                } else if (type === 'pause') {
                    const duration = parseInt(row.querySelector('.seg-duration')?.value || '2');
                    segments.push({ type, duration });
                } else if (type === 'fast_blink' || type === 'slow_blink') {
                    const times = parseInt(row.querySelector('.seg-times')?.value || '3');
                    segments.push({ type, times });
                } else if (type === 'flash') {
                    const text = row.querySelector('.seg-text').value;
                    const color = row.querySelector('.seg-color').value;
                    const duration = parseInt(row.querySelector('.seg-duration')?.value || '2');
                    const scroll_off = row.querySelector('.seg-scroll-off')?.checked || false;
                    if (text) segments.push({ type, text, color, duration, scroll_off });
                }
            });
            return segments;
        }

        function setSegments(segments) {
            segmentsContainer.innerHTML = '';
            if (segments.length === 0) {
                addSegmentRow();
            } else {
                segments.forEach(s => addSegmentRow({
                    text: s.text || '',
                    color: s.color || 'WHITE',
                    type: s.type || 'text',
                    duration: s.duration || 2,
                    times: s.times || 3,
                    scroll_off: s.scroll_off || false,
                }));
            }
        }

        // Initialize with one empty segment row
        addSegmentRow();

        // Direct send form
        const messageForm = document.getElementById('messageForm');
        const status = document.getElementById('status');

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                text: document.getElementById('text').value,
                color: document.getElementById('color').value,
                background: document.getElementById('background').value,
                font: document.getElementById('font').value,
                speed: parseInt(document.getElementById('speed').value)
            };

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                showStatus(status, response.ok, response.ok ? `Sent! (${result.bytes_sent} bytes)` : result.error);
            } catch (err) {
                showStatus(status, false, 'Connection error');
            }
        });

        // Text management
        const textForm = document.getElementById('textForm');
        const textStatus = document.getElementById('textStatus');
        const textList = document.getElementById('textList');
        const editId = document.getElementById('editId');
        const submitBtn = document.getElementById('submitBtn');
        const cancelBtn = document.getElementById('cancelEdit');

        function showStatus(el, success, message) {
            el.style.display = 'block';
            el.className = 'status ' + (success ? 'success' : 'error');
            el.textContent = message;
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escapeAttr(text) {
            return text.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderSegmentBadges(segments) {
            if (!segments || segments.length === 0) return '';
            return segments.map(s => {
                const type = s.type || 'text';
                if (type === 'pause') {
                    return `<span class="segment-color-indicator badge-control">[Pause ${s.duration}s]</span>`;
                } else if (type === 'fast_blink') {
                    return `<span class="segment-color-indicator badge-control">[Fast Blink x${s.times}]</span>`;
                } else if (type === 'slow_blink') {
                    return `<span class="segment-color-indicator badge-control">[Slow Blink x${s.times}]</span>`;
                } else if (type === 'flash') {
                    return `<span class="segment-color-indicator badge-control">[Flash "${escapeHtml(s.text)}" ${s.duration}s${s.scroll_off ? ' scroll' : ''}]</span>`;
                }
                return `<span class="segment-color-indicator" style="color: ${COLOR_CSS[s.color] || '#fff'}; border: 1px solid ${COLOR_CSS[s.color] || '#fff'}44">${escapeHtml(s.text)} <small>(${s.color})</small></span>`;
            }).join('');
        }

        async function loadTexts() {
            try {
                const response = await fetch('/texts');
                const data = await response.json();
                renderTexts(data.texts || []);
            } catch (err) {
                textList.innerHTML = '<div class="empty-state">Failed to load texts</div>';
            }
        }

        function renderTexts(texts) {
            if (texts.length === 0) {
                textList.innerHTML = '<div class="empty-state">No texts stored yet. Add one above!</div>';
                return;
            }

            textList.innerHTML = texts.map(t => `
                <div class="text-item ${t.active ? 'active' : 'inactive'}">
                    <div class="text-content">${renderSegmentBadges(t.segments)}</div>
                    <div class="text-meta">
                        <span class="badge badge-color">BG: ${t.background}</span>
                        <span class="badge badge-color">${t.font}</span>
                        <span class="badge badge-color">Speed: ${t.speed}</span>
                        <span class="badge badge-color">#${t.id}</span>
                    </div>
                    <div class="text-actions">
                        <button class="btn btn-small" onclick="toggleActive(${t.id})">${t.active ? 'Deactivate' : 'Activate'}</button>
                        <button class="btn btn-small btn-secondary" onclick="editText(${t.id})">Edit</button>
                        <button class="btn btn-small btn-danger" onclick="deleteText(${t.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        textForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const segments = getSegments();
            if (segments.length === 0) {
                showStatus(textStatus, false, 'Please add at least one segment');
                return;
            }
            const data = {
                segments: segments,
                background: document.getElementById('textBackground').value,
                font: document.getElementById('textFont').value,
                speed: parseInt(document.getElementById('textSpeed').value),
                active: document.getElementById('textActive').checked
            };

            const id = editId.value;
            const url = id ? `/texts/${id}` : '/texts';
            const method = id ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (response.ok) {
                    showStatus(textStatus, true, id ? 'Text updated!' : 'Text added!');
                    resetForm();
                    loadTexts();
                } else {
                    showStatus(textStatus, false, result.error);
                }
            } catch (err) {
                showStatus(textStatus, false, 'Connection error');
            }
        });

        function resetForm() {
            textForm.reset();
            editId.value = '';
            submitBtn.textContent = 'Add Text';
            cancelBtn.style.display = 'none';
            document.getElementById('textSpeedValue').textContent = '32';
            setSegments([]);
        }

        cancelBtn.addEventListener('click', resetForm);

        async function editText(id) {
            try {
                const response = await fetch(`/texts/${id}`);
                const data = await response.json();
                if (response.ok) {
                    const t = data.text;
                    editId.value = t.id;
                    setSegments(t.segments || [{ text: t.content, color: 'WHITE' }]);
                    document.getElementById('textBackground').value = t.background;
                    document.getElementById('textFont').value = t.font;
                    document.getElementById('textSpeed').value = t.speed;
                    document.getElementById('textSpeedValue').textContent = t.speed;
                    document.getElementById('textActive').checked = t.active;
                    submitBtn.textContent = 'Update Text';
                    cancelBtn.style.display = 'block';
                    const firstInput = segmentsContainer.querySelector('input');
                    if (firstInput) firstInput.focus();
                }
            } catch (err) {
                showStatus(textStatus, false, 'Failed to load text');
            }
        }

        async function deleteText(id) {
            if (!confirm('Delete this text?')) return;
            try {
                const response = await fetch(`/texts/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showStatus(textStatus, true, 'Text deleted!');
                    loadTexts();
                } else {
                    showStatus(textStatus, false, 'Failed to delete');
                }
            } catch (err) {
                showStatus(textStatus, false, 'Connection error');
            }
        }

        async function toggleActive(id) {
            try {
                const response = await fetch(`/texts/${id}/active`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: '{}'
                });
                if (response.ok) {
                    loadTexts();
                }
            } catch (err) {
                showStatus(textStatus, false, 'Connection error');
            }
        }

        // Initial load
        loadTexts();
    </script>
</body>
</html>
