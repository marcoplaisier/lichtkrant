<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichtkrant</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff8855;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #aaa;
        }
        input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #16213e;
            color: #fff;
            font-size: 16px;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #00ff88;
        }
        input[type="range"] {
            width: 100%;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }
        button:hover {
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        .status.success {
            background: #00ff8833;
            color: #00ff88;
        }
        .status.error {
            background: #ff006633;
            color: #ff6666;
        }
        .color-preview {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            vertical-align: middle;
            margin-right: 8px;
        }
        .speed-value {
            text-align: center;
            color: #00ff88;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Lichtkrant</h1>

    <form id="messageForm">
        <div class="form-group">
            <label for="text">Message</label>
            <input type="text" id="text" name="text" placeholder="Enter your message..." maxlength="200" required>
        </div>

        <div class="form-group">
            <label for="color">Text Color</label>
            <select id="color" name="color">
                <option value="WHITE">White</option>
                <option value="GREEN">Green</option>
                <option value="RED">Red</option>
                <option value="BLUE">Blue</option>
                <option value="YELLOW">Yellow</option>
                <option value="CYAN">Cyan</option>
                <option value="MAGENTA">Magenta</option>
            </select>
        </div>

        <div class="form-group">
            <label for="background">Background</label>
            <select id="background" name="background">
                <option value="NONE">None (Black)</option>
                <option value="GREEN">Green</option>
                <option value="RED">Red</option>
                <option value="BLUE">Blue</option>
                <option value="YELLOW">Yellow</option>
                <option value="CYAN">Cyan</option>
                <option value="MAGENTA">Magenta</option>
                <option value="WHITE">White</option>
            </select>
        </div>

        <div class="form-group">
            <label for="font">Font</label>
            <select id="font" name="font">
                <option value="KONGTEXT">Kongtext</option>
                <option value="CUSTOM">Custom</option>
                <option value="MUNRO_SMALL">Munro Small</option>
            </select>
        </div>

        <div class="form-group">
            <label for="speed">Scroll Speed</label>
            <input type="range" id="speed" name="speed" min="1" max="255" value="32">
            <div class="speed-value" id="speedValue">32</div>
        </div>

        <button type="submit">Send to Display</button>
    </form>

    <div id="status" class="status" style="display: none;"></div>

    <script>
        const form = document.getElementById('messageForm');
        const status = document.getElementById('status');
        const speedSlider = document.getElementById('speed');
        const speedValue = document.getElementById('speedValue');

        speedSlider.addEventListener('input', () => {
            speedValue.textContent = speedSlider.value;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                text: document.getElementById('text').value,
                color: document.getElementById('color').value,
                background: document.getElementById('background').value,
                font: document.getElementById('font').value,
                speed: parseInt(speedSlider.value)
            };

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                status.style.display = 'block';
                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = `Message sent! (${result.bytes_sent} bytes)`;
                } else {
                    status.className = 'status error';
                    status.textContent = result.error || 'Failed to send message';
                }
            } catch (err) {
                status.style.display = 'block';
                status.className = 'status error';
                status.textContent = 'Connection error';
            }

            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
