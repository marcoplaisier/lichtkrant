<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichtkrant - Connected</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .welcome {
            text-align: center;
            max-width: 320px;
        }
        h1 {
            color: #00ff88;
            font-size: 28px;
            margin-bottom: 12px;
        }
        p {
            color: #9ca3af;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .open-btn {
            display: inline-block;
            padding: 16px 40px;
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.1s;
        }
        .open-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="welcome">
        <h1>Lichtkrant</h1>
        <p>Connected! Tap the button below to open the full interface in your browser.</p>
        <a class="open-btn" href="/">Open Lichtkrant</a>
    </div>
</body>
</html>
